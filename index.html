<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Página com Apple Pay</title>
    <script crossorigin src="https://applepay.cdn-apple.com/jsapi/1.latest/apple-pay-sdk.js"></script>
    <script>
        async function onApplePayButtonClicked() {
            if (!window.ApplePaySession || !ApplePaySession.canMakePayments()) {
                console.log("Apple: ", window.ApplePaySession.canMakePayments());
                console.log("Apple Pay não está disponível.");
                return;
            }

            try {
                const paymentRequest = {
                    countryCode: "BR",
                    currencyCode: "BRL",
                    supportedNetworks: ["visa", "masterCard"],
                    merchantCapabilities: ["supports3DS"],
                    total: {
                        label: "Demo (Card is not charged)",
                        amount: "1.00",
                    },
                };

                const session = new ApplePaySession(3, paymentRequest);

                session.onvalidatemerchant = async (event) => {
                    console.log("onmerchantvalidation");
                    try {
                        const merchantSession = await validateMerchant(
                            event.validationURL
                        );
                        console.log("merchantSession: ", merchantSession);
                        session.completeMerchantValidation(merchantSession);
                    } catch (error) {
                        console.log("catch: Erro ao validar o comerciante:", error);
                        session.abort();
                    }
                };

                session.onpaymentauthorized = async (event) => {
                    console.log("Pagamento autorizado:", event.payment);
                    try {
                        const token = event.payment.token;
                        const response = await fetch(
                            "https://api.mercadopago.com/platforms/pci/applepay/v1/tokenize",
                            {
                                method: "POST",
                                headers: {
                                    // "X-Product-ID": "BTR2N61O1F60OR8RLSGG",
                                    "Content-Type": "application/json",
                                    "X-Public-key": "APP_USR-0f13f8fe-8192-42c8-b485-cfec6709bfcc",
                                    "X-Caller-SiteId": "MLB"
                                    // "X-Skip-Timestamp-Validation": "true",
                                },
                                body: JSON.stringify({
                                    payment_method: {
                                        type: "applepay",
                                        payment_data: btoa(JSON.stringify(token.paymentData)),
                                    },
                                    transaction_identifier: token.transactionIdentifier,
                                    device: {
                                        meli: {
                                            session_id: "armor.0cbd5d05c83fff57321ca83ef7be78ed99cc0da3fead7c4349b790e072565b77be3923f53801585f6f67df05d0b653ba9d35028ed3e76d28c52472072f027686c9b94a65acf6028bd317d192504435086e9bc3a3268ee2f922d59d89cb6ff423.b7f89e7a9e18fe443e8a179faf2b458e",
                                        },
                                    },
                                }),
                            }
                        );

                        if (!response.ok) {
                            throw new Error("Erro ao tokenizar: " + response.statusText);
                        }

                        const tokenizeResult = await response.json();
                        console.log("Tokenização concluída:", tokenizeResult);

                        session.completePayment(ApplePaySession.STATUS_SUCCESS);

                        const statusElement = document.getElementById("payment-status");
                        statusElement.textContent = "Pagamento concluído com sucesso!";
                        statusElement.style.color = "green";
                    } catch (error) {
                        console.log("Erro ao tokenizar pagamento:", error);
                        session.completePayment(ApplePaySession.STATUS_FAILURE);

                        const statusElement = document.getElementById("payment-status");
                        statusElement.textContent = "Erro ao processar pagamento.";
                        statusElement.style.color = "red";
                    }
                };

                session.oncancel = () => {
                    console.log("Pagamento cancelado pelo usuário.");
                };

                session.begin();
            } catch (error) {
                console.log("Erro ao gerar o pagamento:", error);
            }
        }

        async function validateMerchant(validationURL) {
            console.log("Validando comerciante...");
            console.log("validationURL", validationURL);
            const response = await fetch(
                "https://api.mercadopago.com/applepay/v1/session",
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-Public-key": "APP_USR-0f13f8fe-8192-42c8-b485-cfec6709bfcc",
                    },
                    body: JSON.stringify({
                        id: "C7sqpuMvWLRV/7wqF64pZILIQqEKZV9kvnFYpiwirL4=",
                        merchantIdentifier: "merchant.app.vercel.simple-apple-pay.web",
                        domainName: "simple-apple-pay.vercel.app",
                        displayName: "Camiseta",
                        initiative: "web",
                        initiativeContext: "simple-apple-pay.vercel.app",
                        validationURL: validationURL,
                    }),
                }
            );

            console.log("response", response, response.status);

            if (!response.ok) {
                throw new Error(
                    "/session: Erro ao validar o comerciante: " + response.statusText
                );
            }

            return response.json();
        }
    </script>
    <style>
        apple-pay-button {
            --apple-pay-button-width: 150px;
            --apple-pay-button-height: 30px;
            --apple-pay-button-border-radius: 3px;
            --apple-pay-button-padding: 0px 0px;
            --apple-pay-button-box-sizing: border-box;
            display: initial;
        }
    </style>
</head>

<body>
    <h1>Teste Apple Pay SEM usar a SDK-Javascript</h1>
    <apple-pay-button buttonstyle="black" type="plain" locale="pt-BR" onclick="onApplePayButtonClicked()"
        lang="pt-BR"></apple-pay-button>
    <p id="payment-status"></p>
</body>

</html>
